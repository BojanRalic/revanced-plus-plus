name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        env:
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:buildAndroid clean

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' gradle.properties | cut -d= -f2 | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Revanced++ v${{ steps.version.outputs.version }}
          body: |
            ## Revanced++ Patches v${{ steps.version.outputs.version }}

            ### Installation
            1. Download **ReVanced Manager** from [github.com/ReVanced/revanced-manager/releases](https://github.com/ReVanced/revanced-manager/releases)
            2. In ReVanced Manager: Settings → Sources → Add source
            3. Enter: `https://github.com/BojanRalic/revanced-plus-plus/releases/latest/download/patches.rvp`
            4. Download **YouTube APK** (version 20.14.43) from [apkmirror.com](https://www.apkmirror.com/apk/google-inc/youtube/youtube-20-14-43-release/)
            5. In ReVanced Manager: Patcher → Select application → Storage → choose the YouTube APK
            6. Select patches → Patch → Install
          files: patches/build/libs/patches-*.rvp
          fail_on_unmatched_files: false
          make_latest: true